<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>기능 데모</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { border: 1px solid #ccc; padding: 20px; width: 300px; }

        /* 기본 알약 스타일 */
        .pill {
            display: block;
            padding: 5px 10px;
            border-radius: 15px;
            margin-bottom: 5px;
            cursor: pointer;
            border: 1px solid #ccc;
            background-color: #f0f0f0;

            /* 텍스트가 길어지면 ... 처리 */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px; /* 최대 너비 */
        }

        /* --- 그룹 --- */
        .group-container {
            position: relative; /* 팝업 위치의 기준 */
        }

        .group-pill {
            background-color: #e0e0ff;
            font-weight: bold;
            border: 2px solid #a0a0ff;
        }

        /* --- 그룹 팝업 --- */
        .group-popup {
            display: none; /* 평소에는 숨김 */
            position: absolute;
            bottom: 100%; /* 그룹 알약 바로 위에 표시 */
            left: 0;
            background-color: white;
            border: 1px solid #999;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 10;
            width: max-content;
        }

        /* 그룹 알약에 마우스를 올리면 팝업 보이기 */
        .group-container:hover .group-popup {
            display: block;
        }

        /* --- 개별 항목 --- */
        .item-container {
            position: relative; /* 툴팁 위치의 기준 */
        }

        .item-pill {
            background-color: #e0ffe0;
        }

        /* --- 세부 정보 툴팁 --- */
        .item-tooltip {
            display: none; /* 평소에는 숨김 */
            position: absolute;
            top: 0;
            left: 105%; /* 개별 알약 바로 오른쪽에 표시 */
            background-color: #333;
            color: white;
            padding: 5px 8px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 20;
            white-space: nowrap;
        }

        /* 개별 알약에 마우스를 올리면 툴팁 보이기 */
        .item-container:hover .item-tooltip {
            display: block;
        }
    </style>
</head>
<body>
    <h2>기능 데모</h2>
    <p>그룹 항목 위에 마우스를 올려보세요.</p>
    <div class="container">
        <div class="group-container">
            <div class="pill group-pill" title="아주 긴 그룹 이름입니다. 너무 길어서 ... 처리됩니다.">
                CD100 그룹 (긴 이름 테스트...)
            </div>

            <!-- 그룹 팝업 -->
            <div class="group-popup">
                <div class="item-container">
                    <div class="pill item-pill">CD101 개별 항목</div>
                    <div class="item-tooltip">
                        상태: 성공<br>
                        일시: 2025-11-27 10:00
                    </div>
                </div>
                <div class="item-container">
                    <div class="pill item-pill" title="이것 또한 아주 긴 개별 항목의 이름입니다.">
                        CD102 이것 또한 아주 긴 개별 항목의 이름입니다.
                    </div>
                    <div class="item-tooltip">
                        상태: 실패<br>
                        일시: 2025-11-27 10:01
                    </div>
                </div>
                 <div class="item-container">
                    <div class="pill item-pill">CD103</div>
                    <div class="item-tooltip">
                        상태: 수집중<br>
                        일시: 2025-11-27 10:02
                    </div>
                </div>
            </div>
        </div>

         <div class="pill" title="이것은 일반 항목입니다.">
            이것은 일반 항목입니다.
        </div>
    </div>
</body>
</html>
