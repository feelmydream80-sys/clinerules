<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Key Management</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --bg2: #161b27;
    --bg3: #1e2535;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text2: #8892a4;
    --text3: #4d5668;
    --ok: #22c984;
    --ok-bg: rgba(34,201,132,0.1);
    --ok-border: rgba(34,201,132,0.25);
    --warn: #f5a623;
    --warn-bg: rgba(245,166,35,0.1);
    --warn-border: rgba(245,166,35,0.25);
    --err: #f04f54;
    --err-bg: rgba(240,79,84,0.1);
    --err-border: rgba(240,79,84,0.25);
    --today: #f04f54;
    --radius: 8px;
    --radius-lg: 12px;
  }

  body {
    font-family: 'IBM Plex Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
    font-size: 14px;
  }

  h1 {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 1.75rem;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h1::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 18px;
    background: var(--ok);
    border-radius: 3px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 1.75rem;
  }

  .metric-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
  }
  .metric-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .metric-value {
    font-size: 28px;
    font-weight: 500;
    font-family: 'IBM Plex Mono', monospace;
  }
  .metric-value.ok  { color: var(--ok); }
  .metric-value.warn { color: var(--warn); }
  .metric-value.err { color: var(--err); }
  .metric-value.total { color: var(--text); }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .controls input,
  .controls select {
    font-family: 'IBM Plex Sans KR', sans-serif;
    font-size: 13px;
    padding: 7px 12px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--bg2);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .controls input { flex: 1; min-width: 200px; }
  .controls input:focus,
  .controls select:focus { border-color: var(--ok); }
  .controls select option { background: var(--bg2); }

  .section-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 1.5rem 0 0.6rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label span {
    font-family: 'IBM Plex Mono', monospace;
    background: var(--bg3);
    border: 0.5px solid var(--border);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 11px;
    color: var(--text2);
    text-transform: none;
    letter-spacing: 0;
  }

  .gantt-wrapper {
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bg2);
  }

  .gantt-header {
    display: flex;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg3);
  }
  .col-key {
    width: 210px;
    min-width: 210px;
    padding: 8px 14px;
    border-right: 0.5px solid var(--border);
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .col-timeline {
    flex: 1;
    display: flex;
  }
  .tick-label {
    flex: 1;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text3);
    padding: 8px 0;
    text-align: center;
    border-right: 0.5px solid var(--border);
  }
  .tick-label:last-child { border-right: none; }

  .gantt-row {
    display: flex;
    border-bottom: 0.5px solid var(--border);
    align-items: center;
    transition: background 0.1s;
  }
  .gantt-row:last-child { border-bottom: none; }
  .gantt-row:hover { background: rgba(255,255,255,0.025); }

  .key-info {
    width: 210px;
    min-width: 210px;
    padding: 8px 14px;
    border-right: 0.5px solid var(--border);
  }
  .key-name {
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .key-badge {
    display: inline-block;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 1px 6px;
    border-radius: 3px;
    margin-top: 3px;
    border: 0.5px solid transparent;
  }
  .badge-ok   { background: var(--ok-bg);   color: var(--ok);   border-color: var(--ok-border); }
  .badge-warn { background: var(--warn-bg); color: var(--warn); border-color: var(--warn-border); }
  .badge-err  { background: var(--err-bg);  color: var(--err);  border-color: var(--err-border); }

  .bar-area {
    flex: 1;
    position: relative;
    height: 44px;
    cursor: default;
  }
  .grid-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 0.5px;
    background: var(--border);
    pointer-events: none;
  }
  .bar-track {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    height: 10px;
    border-radius: 5px;
    min-width: 3px;
    transition: opacity 0.15s, filter 0.15s;
  }
  .bar-area:hover .bar-track { filter: brightness(1.2); }
  .bar-ok   { background: linear-gradient(90deg, #22c984, #1aaa6e); }
  .bar-warn { background: linear-gradient(90deg, #f5a623, #d48b1a); }
  .bar-err  { background: linear-gradient(90deg, #f04f54, #c83a3e); opacity: 0.65; }

  .today-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 1.5px;
    background: var(--today);
    opacity: 0.7;
    z-index: 2;
    pointer-events: none;
  }
  .today-line::after {
    content: 'today';
    position: absolute;
    top: 4px;
    left: 4px;
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--today);
    white-space: nowrap;
    opacity: 0.8;
  }

  .tooltip {
    position: fixed;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    z-index: 1000;
    display: none;
    min-width: 200px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .t-key {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 6px;
    padding-bottom: 6px;
    border-bottom: 0.5px solid var(--border);
  }
  .t-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    margin-top: 4px;
    font-size: 12px;
  }
  .t-row span:first-child { color: var(--text3); }
  .t-row span:last-child  { font-family: 'IBM Plex Mono', monospace; color: var(--text); }

  .no-result {
    text-align: center;
    padding: 2.5rem;
    color: var(--text3);
    font-size: 13px;
  }

  @media (max-width: 640px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    body { padding: 1rem; }
  }
</style>
</head>
<body>

<h1>API Key Management</h1>
<div class="summary-grid" id="summary"></div>
<div class="controls">
  <input type="text" id="searchInput" placeholder="키 이름 또는 ID 검색..." oninput="render()">
  <select id="filterStatus" onchange="render()">
    <option value="all">전체 상태</option>
    <option value="ok">정상</option>
    <option value="expiring">만료 임박</option>
    <option value="err">비정상</option>
  </select>
  <select id="sortBy" onchange="render()">
    <option value="expiry">만료일 기준 정렬</option>
    <option value="name">이름 기준 정렬</option>
    <option value="start">시작일 기준 정렬</option>
  </select>
</div>
<div id="ganttOk"></div>
<div id="ganttErr"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const today = new Date('2026-04-01');
const VIEW_START = new Date('2025-10-01');
const VIEW_END   = new Date('2027-01-01');
const TOTAL_MS   = VIEW_END - VIEW_START;
const TICKS = ['2025-10','2025-12','2026-02','2026-04','2026-06','2026-08','2026-10','2026-12'];
const EXPIRY_WARN_DAYS = 30;

function d(s){ return new Date(s); }
function pct(date){ return Math.max(0, Math.min(100, ((d(date)-VIEW_START)/TOTAL_MS)*100)); }

const rawKeys = [
  { id:'sk-prod-alpha-001', name:'prod-alpha-001', start:'2025-11-01', end:'2026-05-15' },
  { id:'sk-prod-beta-002',  name:'prod-beta-002',  start:'2025-10-15', end:'2026-04-10' },
  { id:'sk-prod-gamma-003', name:'prod-gamma-003', start:'2026-01-01', end:'2026-12-31' },
  { id:'sk-prod-delta-004', name:'prod-delta-004', start:'2026-02-01', end:'2026-09-30' },
  { id:'sk-prod-eps-005',   name:'prod-eps-005',   start:'2025-12-01', end:'2026-07-15' },
  { id:'sk-prod-zeta-006',  name:'prod-zeta-006',  start:'2026-03-01', end:'2026-11-01' },
  { id:'sk-prod-eta-007',   name:'prod-eta-007',   start:'2026-01-15', end:'2026-08-20' },
  { id:'sk-dev-theta-008',  name:'dev-theta-008',  start:'2025-11-15', end:'2026-06-30' },
  { id:'sk-dev-iota-009',   name:'dev-iota-009',   start:'2026-02-15', end:'2026-10-15' },
  { id:'sk-dev-kappa-010',  name:'dev-kappa-010',  start:'2025-10-01', end:'2026-04-05' },
  { id:'sk-int-lambda-011', name:'int-lambda-011', start:'2026-01-01', end:'2026-05-01' },
  { id:'sk-int-mu-012',     name:'int-mu-012',     start:'2026-03-15', end:'2026-12-15' },
  { id:'sk-prod-nu-013',    name:'prod-nu-013',    start:'2025-12-15', end:'2026-06-01' },
  { id:'sk-prod-xi-014',    name:'prod-xi-014',    start:'2026-01-20', end:'2026-07-20' },
  { id:'sk-prod-omi-015',   name:'prod-omi-015',   start:'2026-02-10', end:'2026-09-10' },
  { id:'sk-legacy-pi-016',  name:'legacy-pi-016',  start:'2025-04-01', end:'2026-01-15', status:'err', reason:'만료됨' },
  { id:'sk-legacy-rho-017', name:'legacy-rho-017', start:'2025-03-01', end:'2025-12-31', status:'err', reason:'만료됨' },
  { id:'sk-revoked-018',    name:'revoked-018',    start:'2025-08-01', end:'2026-08-01', status:'err', reason:'수동 폐기' },
  { id:'sk-invalid-019',    name:'invalid-019',    start:'2025-09-15', end:'2026-03-01', status:'err', reason:'인증 오류' },
  { id:'sk-revoked-020',    name:'revoked-020',    start:'2026-01-01', end:'2026-10-01', status:'err', reason:'수동 폐기' },
  { id:'sk-prod-tau-021',   name:'prod-tau-021',   start:'2026-03-20', end:'2026-04-20' },
  { id:'sk-prod-ups-022',   name:'prod-ups-022',   start:'2026-01-05', end:'2026-04-25' },
  { id:'sk-dev-phi-023',    name:'dev-phi-023',    start:'2026-02-01', end:'2026-04-28' },
  { id:'sk-int-chi-024',    name:'int-chi-024',    start:'2025-11-01', end:'2026-04-15' },
  { id:'sk-prod-psi-025',   name:'prod-psi-025',   start:'2025-12-01', end:'2026-04-18' },
];

const keys = rawKeys.map(k => {
  const endDate = d(k.end);
  const daysLeft = Math.ceil((endDate - today) / 86400000);
  let status = k.status || 'ok';
  if (status === 'ok' && daysLeft <= EXPIRY_WARN_DAYS && daysLeft > 0) status = 'expiring';
  if (status === 'ok' && daysLeft <= 0) status = 'err';
  return { ...k, endDate, daysLeft, status, reason: k.reason || (daysLeft <= 0 ? '만료됨' : null) };
});

function renderSummary() {
  const total    = keys.length;
  const ok       = keys.filter(k => k.status === 'ok').length;
  const expiring = keys.filter(k => k.status === 'expiring').length;
  const err      = keys.filter(k => k.status === 'err').length;
  document.getElementById('summary').innerHTML = `
    <div class="metric-card"><div class="metric-label">전체 키</div><div class="metric-value total">${total}</div></div>
    <div class="metric-card"><div class="metric-label">정상</div><div class="metric-value ok">${ok}</div></div>
    <div class="metric-card"><div class="metric-label">만료 임박 (30일)</div><div class="metric-value warn">${expiring}</div></div>
    <div class="metric-card"><div class="metric-label">비정상</div><div class="metric-value err">${err}</div></div>
  `;
}

function buildGantt(labelText, items, containerId) {
  if (!items.length) { document.getElementById(containerId).innerHTML = ''; return; }
  const todayP = pct(today);
  const tickLines = TICKS.map((_,i) => {
    const p = (i / (TICKS.length - 1)) * 100;
    return `<div class="grid-line" style="left:${p}%"></div>`;
  }).join('');

  const rows = items.map(k => {
    const left  = pct(k.start);
    const right = pct(k.end);
    const w     = Math.max(right - left, 0.3);
    const barCls   = k.status === 'ok' ? 'bar-ok' : k.status === 'expiring' ? 'bar-warn' : 'bar-err';
    const badgeCls = k.status === 'ok' ? 'badge-ok' : k.status === 'expiring' ? 'badge-warn' : 'badge-err';
    const badgeTxt = k.status === 'ok' ? '정상' : k.status === 'expiring' ? `D-${k.daysLeft}` : (k.reason || '비정상');
    return `
      <div class="gantt-row">
        <div class="key-info">
          <div class="key-name" title="${k.id}">${k.name}</div>
          <span class="key-badge ${badgeCls}">${badgeTxt}</span>
        </div>
        <div class="bar-area"
          data-id="${k.id}" data-start="${k.start}" data-end="${k.end}"
          data-status="${k.status}" data-reason="${k.reason||''}" data-days="${k.daysLeft}"
          onmouseenter="showTip(event,this)" onmouseleave="hideTip()">
          ${tickLines}
          <div class="today-line" style="left:${todayP}%"></div>
          <div class="bar-track ${barCls}" style="left:${left}%;width:${w}%"></div>
        </div>
      </div>`;
  }).join('');

  const ticksHtml = TICKS.map(t => `<div class="tick-label">${t}</div>`).join('');
  document.getElementById(containerId).innerHTML = `
    <div class="section-label">${labelText.split('(')[0].trim()} <span>${items.length}개</span></div>
    <div class="gantt-wrapper">
      <div class="gantt-header">
        <div class="col-key">API 키</div>
        <div class="col-timeline">${ticksHtml}</div>
      </div>
      ${rows}
    </div>`;
}

function render() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const fStatus = document.getElementById('filterStatus').value;
  const sortBy  = document.getElementById('sortBy').value;

  let filtered = keys.filter(k => {
    const matchQ = !q || k.name.includes(q) || k.id.includes(q);
    const matchS = fStatus === 'all' || k.status === fStatus;
    return matchQ && matchS;
  });

  filtered.sort((a, b) => {
    if (sortBy === 'expiry') return a.endDate - b.endDate;
    if (sortBy === 'name')   return a.name.localeCompare(b.name);
    return d(a.start) - d(b.start);
  });

  const okKeys  = filtered.filter(k => k.status === 'ok' || k.status === 'expiring');
  const errKeys = filtered.filter(k => k.status === 'err');

  if (!filtered.length) {
    document.getElementById('ganttOk').innerHTML  = '<div class="no-result">검색 결과가 없습니다.</div>';
    document.getElementById('ganttErr').innerHTML = '';
    return;
  }
  buildGantt('정상 키', okKeys, 'ganttOk');
  buildGantt('비정상 키', errKeys, 'ganttErr');
}

function showTip(e, el) {
  const tip      = document.getElementById('tooltip');
  const daysLeft = parseInt(el.dataset.days);
  const statusTxt = el.dataset.status === 'ok'
    ? '정상'
    : el.dataset.status === 'expiring'
      ? `만료 임박 (D-${daysLeft})`
      : (el.dataset.reason || '비정상');
  tip.innerHTML = `
    <div class="t-key">${el.dataset.id}</div>
    <div class="t-row"><span>시작일</span><span>${el.dataset.start}</span></div>
    <div class="t-row"><span>만료일</span><span>${el.dataset.end}</span></div>
    <div class="t-row"><span>상태</span><span>${statusTxt}</span></div>`;
  tip.style.display = 'block';
  moveTip(e);
}
function moveTip(e) {
  const tip = document.getElementById('tooltip');
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 12) + 'px';
}
function hideTip() { document.getElementById('tooltip').style.display = 'none'; }
document.addEventListener('mousemove', e => {
  if (document.getElementById('tooltip').style.display !== 'none') moveTip(e);
});

renderSummary();
render();
</script>
</body>
</html>
