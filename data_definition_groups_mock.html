                card.addEventListener('click', () => selectGroup(group));
                container.appendChild(card);
            });
        }

        // 2. 臋藝赂毛艁拧 ?聽铆聝聺 臎藳聵毛艢殴
        function selectGroup(group) {
            // 臋赂掳臎膭麓 ?聽铆聝聺??臎拧麓毛聯聹 ?陇铆???臎麓聢臋赂掳??
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            
            // ?聽铆聝聺??臎拧麓毛聯聹 ?聵臎聺麓?藕臎聺麓??
            const selectedCard = event.currentTarget;
            selectedCard.classList.add('selected');
            
            selectedGroup = group;
            
            // ?聛臎聞赂 ?聲毛艂麓 ?篓毛聞聬 ?聹臎聥聹 毛掳??掳臎聺麓??毛膭聹毛聯聹
            loadGroupDetails(group.cd);
        }

        // 3. 臋藝赂毛艁拧 ?聛臎聞赂 ?聲毛艂麓 毛膭聹毛聯聹 毛掳??聦毛聧聰毛搂?
        async function loadGroupDetails(groupCd) {
            logger.addLog('INFO', `臋藝赂毛艁拧 ?聛臎聞赂 ?聲毛艂麓 毛膭聹毛聯聹 ?聹臎聻聭: ${groupCd}`, { groupCd });
            
            const detailPanel = document.getElementById('detailPanel');
            const selectedGroupTitle = document.getElementById('selectedGroupTitle');
            const detailTableBody = document.getElementById('detailTableBody');

            // ?聙?麓铆? ?聟毛聧掳?麓铆聤赂
            selectedGroupTitle.textContent = `${selectedGroup.cd_nm} (${selectedGroup.cd})`;

            // ?聦臎聺麓毛赂??麓臎職艩 臎麓聢臋赂掳??
            detailTableBody.innerHTML = '';

            // ?陇臎聽聹 API ?赂臎艣聹 ?聹毛聫聞
            try {
                logger.addLog('INFO', `?陇臎聽聹 API ?赂臎艣聹 ?聹毛聫聞: /api/data_definition/group/${groupCd}`);
                const apiDetails = await callAPI(`data_definition/group/${groupCd}`);
                logger.addLog('INFO', `?陇臎聽聹 API ?赂臎艣聹 ?膮臋艂木: ${groupCd}`, apiDetails);
                
                // API ?掳臎聺麓?掳臋? ?聢臎聹藕毛艩??殴臎職艩, ?聠臎聹藕毛艩?Mock ?掳臎聺麓???殴臎職艩
                if (apiDetails && apiDetails.length > 0) {
                    logger.addLog('INFO', 'API ?聛臎聞赂 ?掳臎聺麓???殴臎職艩');
                    renderDetailRows(apiDetails);
                } else {
                    logger.addLog('INFO', 'API ?聛臎聞赂 ?掳臎聺麓???聠臎聺聦, Mock ?掳臎聺麓???殴臎職艩');
                    renderMockDetails(groupCd);
                }
            } catch (error) {
                logger.addLog('WARN', `?陇臎聽聹 API ?赂臎艣聹 ?陇铆聦篓: ${groupCd}, Mock ?掳臎聺麓???殴臎職艩`, { error: error.message });
                renderMockDetails(groupCd);
            }

            // ?聛臎聞赂 ?篓毛聞聬 ?聹臎聥聹
            detailPanel.style.display = 'block';
            
            // 毛藳聞铆聤藕 ?聛铆聝聹 臎麓聢臋赂掳??
            updateActionButtons();
            
            logger.addLog('INFO', `臋藝赂毛艁拧 ?聛臎聞赂 ?聲毛艂麓 毛膭聹毛聯聹 ?聞毛艁聦: ${groupCd}`);
        }

        // Mock ?掳臎聺麓???聦毛聧聰毛搂??篓臎聢聵
        function renderMockDetails(groupCd) {
            const detailTableBody = document.getElementById('detailTableBody');
            const details = mockData.details[groupCd] || [];

            if (details.length === 0) {
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = '<td colspan="4" style="text-align: center; color: #94a3b8;">?掳臎聺麓?掳臋? ?聠臎聤木?聢毛聥陇.</td>';
                detailTableBody.appendChild(emptyRow);
            } else {
                details.forEach(item => {
                    const row = renderDetailRow(item);
                    detailTableBody.appendChild(row);
                });
            }
        }

        // API ?掳臎聺麓???聦毛聧聰毛搂??篓臎聢聵
        function renderDetailRows(details) {
            const detailTableBody = document.getElementById('detailTableBody');
            
            if (details.length === 0) {
                const emptyRow = document.createElement('tr');
                emptyRow.innerHTML = '<td colspan="4" style="text-align: center; color: #94a3b8;">?掳臎聺麓?掳臋? ?聠臎聤木?聢毛聥陇.</td>';
                detailTableBody.appendChild(emptyRow);
            } else {
                details.forEach(item => {
                    const row = renderDetailRow(item);
                    detailTableBody.appendChild(row);
                });
            }
        }

        // 4. ?聛臎聞赂 ???聦毛聧聰毛搂?(use_yn???掳毛慕赂 ?聹臋掳聛??臋木殴毛艣聞 ?殴铆聲篓)
        function renderDetailRow(item) {
            const row = document.createElement('tr');
            
            // use_yn??'N'??臋藳藵臎職掳 ?聹臋掳聛??臋木殴毛艣聞 ?聛臎職艩
            if (item.use_yn !== 'Y') {
                row.className = 'inactive-row';
            }
            
            // ???麓毛艢颅 ?麓毛藳陇??臎艣聰臋?
            row.addEventListener('click', () => selectDetailRow(row, item));
            
            row.innerHTML = `
                <td>${item.cd}</td>
                <td>${item.cd_nm}</td>
                <td>
                    <span class="${item.use_yn === 'Y' ? '' : 'inactive-text'}">
                        ${item.use_yn === 'Y' ? '?殴臎職艩臎陇? : '?殴臎職艩?聢铆聲篓'}
                    </span>
                </td>
                <td>${item.update_dt || '-'}</td>
            `;
            
            return row;
        }

        // 5. ?聛臎聞赂 ???聽铆聝聺 臎藳聵毛艢殴
        function selectDetailRow(row, item) {
            // 臋赂掳臎膭麓 ?聽铆聝聺?????陇铆???臎麓聢臋赂掳??
            document.querySelectorAll('#detailTableBody tr').forEach(r => r.style.backgroundColor = '');
            
            // ?聽铆聝聺?????聵臎聺麓?藕臎聺麓??
            row.style.backgroundColor = '#e6f7ee';
            
            selectedRow = { row, item };
            
            // ?膭臎聟聵 毛藳聞铆聤藕 ?聹臎聞膮??
            updateActionButtons();
        }

        // 6. ?膭臎聟聵 毛藳聞铆聤藕 ?聛铆聝聹 ?聟毛聧掳?麓铆聤赂
        function updateActionButtons() {
            const editBtn = document.getElementById('editBtn');
            const deleteBtn = document.getElementById('deleteBtn');
            
            if (selectedRow) {
                editBtn.disabled = false;
                deleteBtn.disabled = false;
            } else {
                editBtn.disabled = true;
                deleteBtn.disabled = true;
            }
        }

        // 7. ?麓毛藳陇??毛艢殴臎聤陇???陇臎聽聲
        function setupEventListeners() {
            const editBtn = document.getElementById('editBtn');
            const deleteBtn = document.getElementById('deleteBtn');

            // ?聵臎聽聲 毛藳聞铆聤藕 ?麓毛艢颅
            editBtn.addEventListener('click', () => {
                if (selectedRow) {
                    showEditModal(selectedRow.item);
                }
            });

            // ??聽聹 毛藳聞铆聤藕 ?麓毛艢颅
            deleteBtn.addEventListener('click', () => {
                if (selectedRow) {
                    showDeleteConfirm(selectedRow.item);
                }
            });
        }

        // 8. ?聵臎聽聲 毛艦篓毛聥殴 ?聹臎聥聹
        function showEditModal(item) {
            // CD_CL臋艂?CD毛慕??聹臎聶赂?????聲毛艂麓??臎艣聰臎艣聹 (null ?聹臎聶赂)
            const editableFields = [];
            const fieldLabels = {
                'cd_desc': '?聹臎職艩毛艦艩臎聽聛',
                'item1': 'Category ID',
                'item2': 'Category', 
                'item3': 'Columns',
                'item4': 'save_path',
                'item5': 'filename',
                'item6': 'duration',
                'item7': 'URL',
                'item8': 'API_KEY'
            };

            // null???聞毛聥聦 ?聞毛聯聹毛搂?臎艣聰臎艣聹
            Object.keys(fieldLabels).forEach(key => {
                if (item[key] && item[key].trim() !== '') {
                    editableFields.push({
                        key: key,
                        label: fieldLabels[key],
                        value: item[key]
                    });
                }
            });

            if (editableFields.length === 0) {
                alert('?聵臎聽聲 臋掳聙?慕铆聲聹 ?聞毛聯聹臋掳聙 ?聠臎聤木?聢毛聥陇.');
                return;
            }

            // 毛艦篓毛聥殴 ???聺臎聞膮
            let formHTML = `
                <div style="max-height: 400px; overflow-y: auto;">
                    <h4 style="margin-bottom: 15px; color: #333;">${item.cd} - ${item.cd_nm} ?聵臎聽聲</h4>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            `;

            editableFields.forEach(field => {
                formHTML += `
                    <div style="margin-bottom: 10px;">
                        <label style="display: block; font-weight: 600; margin-bottom: 5px; color: #555;">${field.label}</label>
                        <input type="text" id="field_${field.key}" value="${field.value}" 
                               style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                    </div>
                `;
            });

            formHTML += `
                    </div>
                </div>
            `;

            // 臎钮陇臎聤陇?聙 毛艦篓毛聥殴 ?聺臎聞膮
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
            `;

            const modalContent = document.createElement('div');
            modalContent.style.cssText = `
                background: white;
                padding: 20px;
                border-radius: 8px;
                width: 600px;
                max-width: 90%;
                max-height: 80%;
                overflow: auto;
            `;
            modalContent.innerHTML = formHTML;

            const buttonContainer = document.createElement('div');
            buttonContainer.style.cssText = 'margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end;';

            const saveBtn = document.createElement('button');
            saveBtn.textContent = '?聙??;
            saveBtn.className = 'btn btn-primary';
            saveBtn.style.cssText = 'padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;';

            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = '臎藝篓臎聠聦';
            cancelBtn.className = 'btn';
            cancelBtn.style.cssText = 'padding: 10px 20px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer;';

            buttonContainer.appendChild(cancelBtn);
            buttonContainer.appendChild(saveBtn);
            modalContent.appendChild(buttonContainer);
            modal.appendChild(modalContent);
            document.body.appendChild(modal);

            // ?麓毛藳陇???赂毛聯陇??
            cancelBtn.addEventListener('click', () => {
                document.body.removeChild(modal);
            });

            saveBtn.addEventListener('click', () => {
                // ?聟毛聽慕臋掳?臋藳聙臎艢?
                let hasChanges = false;
                const updates = {};

                editableFields.forEach(field => {
                    const input = document.getElementById(`field_${field.key}`);
                    const newValue = input.value.trim();
                    
                    if (newValue !== field.value) {
                        hasChanges = true;
                        updates[field.key] = newValue;
                    }
                });

                if (!hasChanges) {
                    alert('毛艂聙臋藳藵毛聬聹 ?麓臎職艩???聠臎聤木?聢毛聥陇.');
                    return;
                }

                // Mock: ?掳臎聺麓???聟毛聧掳?麓铆聤赂 ?聹毛??聢臎聺麓??
                Object.keys(updates).forEach(key => {
                    item[key] = updates[key];
                });
                item.update_dt = new Date().toLocaleString('ko-KR');

                // 毛艦篓毛聥殴 ?扭臋赂掳
                document.body.removeChild(modal);

                // ?聰毛艩麓 ?聟毛聧掳?麓铆聤赂
                loadGroupDetails(selectedGroup.cd);
                
                alert('?聵臎聽聲???聞毛艁聦?聵臎聴聢?木毛聥聢??');
            });
        }

        // 9. ??聽聹 ?聲臎聺赂 ?聹臎聥聹
        function showDeleteConfirm(item) {
            const confirmDelete = confirm(
                `臎藵聰毛聯聹: ${item.cd}\n毛艦聟臎拧颅: ${item.cd_nm}\n\n????艦艩????聽聹?聵臎聥聹臋藳聽臎聤木?聢臋拧聦?\n(?殴臎職艩?殴毛?臋掳聙 'N'?藕毛膭聹 毛艂聙臋藳藵毛聬艩?聢毛聥陇)`
            );
            
            if (confirmDelete) {
                // Mock: ?聦铆聰聞????聽聹 ?聹毛??聢臎聺麓??
                item.use_yn = 'N';
                item.del_dt = new Date().toLocaleString('ko-KR');
                
                // ?聰毛艩麓 ?聟毛聧掳?麓铆聤赂
                loadGroupDetails(selectedGroup.cd);
                
                alert('??聽聹 臎藳聵毛艢殴臋掳聙 ?聞毛艁聦?聵臎聴聢?木毛聥聢??');
            }
        }

        // ?聵臎聺麓臎搂聙 毛膭聹毛聯聹 ??臎麓聢臋赂掳??
        document.addEventListener('DOMContentLoaded', init);

        // 毛膭聹臋藝赂 ?麓毛艢殴??毛藳聞铆聤藕 ?麓毛藳陇??
        document.getElementById('clearLogBtn').addEventListener('click', () => {
            logger.clear();
        });
    </script>
</body>
</html>
